<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # App Service's internal proxy appears to the container as a 169.254.x.x
    # IP, so any "Require ip 169.254..." allowlist matches EVERY request —
    # bypassing auth completely. Instead, identify the health checker by its
    # User-Agent ("HealthCheck/1.0", also "AlwaysOn/1.0" for keep-warm pings).
    SetEnvIfNoCase User-Agent "^(HealthCheck|AlwaysOn)/" jti_healthcheck

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
    </Directory>

    # HTTP Basic Auth — only engaged when Apache is started with -DBASIC_AUTH
    # (the entrypoint adds that flag when env var JTI_BASIC_AUTH=true). Staging
    # is gated this way; production leaves the flag off and serves everyone.
    # Credentials baked into /etc/apache2/.htpasswd at image build time when
    # --build-arg HTPASSWD_PASSWORD=... is provided (see Dockerfile). Stored as
    # GH Actions env secret `PUBLIC_ACCESS_PWD` under the `staging` env.
    <IfDefine BASIC_AUTH>
        <Directory /var/www/html>
            AuthType Basic
            AuthName "JTI Staging"
            AuthUserFile /etc/apache2/.htpasswd
            <RequireAny>
                Require env jti_healthcheck
                Require valid-user
            </RequireAny>
        </Directory>
    </IfDefine>

    # Exception: wp-cron.php — public so an external scheduler (Cloudflare
    # Worker / GH Actions cron / cron-job.org) can fire WP cron without
    # credentials. DISABLE_WP_CRON=true means this is the only way scheduled
    # tasks fire.
    <Location "/wp-cron.php">
        AuthType None
        Require all granted
    </Location>

    # Exception: robots.txt — must be reachable by crawlers so they see the
    # Disallow rule (otherwise they get 401 and may treat the site as
    # unreachable rather than disallowed).
    <Location "/robots.txt">
        AuthType None
        Require all granted
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
