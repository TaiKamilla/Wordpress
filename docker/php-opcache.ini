; Production-tuned OPcache for WordPress on App Service.
; The image bakes plugins/themes/wp-includes — PHP files never change at runtime,
; so validate_timestamps=0 is safe and removes the per-request stat() cost that
; dominates WP boot when validate_timestamps=1 (the PHP default).

[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.fast_shutdown=1
opcache.save_comments=1
; huge_code_pages requires hugepages support on the host; harmless if unsupported.
opcache.huge_code_pages=0
; JIT — WP is mostly I/O bound so the win is small, but it doesn't hurt.
opcache.jit_buffer_size=64M
opcache.jit=tracing

; Realpath cache: helps when validate_timestamps=1, irrelevant when 0,
; but enlarging it is cheap and cuts stat() during opcache cache misses.
realpath_cache_size=4M
realpath_cache_ttl=600
