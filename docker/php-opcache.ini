; Production-tuned OPcache for WordPress on App Service.
;
; History: this used to be validate_timestamps=0 ("files never change at
; runtime, skip the stat"). That was true when wp-content was baked into the
; image, but it became FALSE once jti-custom moved to share-based deploys: the
; polling overlay rsyncs /persist -> the container's LOCAL wp-content at
; runtime, so PHP files DO change under a running container. With
; validate_timestamps=0, opcache pinned the stale compiled bytecode forever and
; jti-custom deploys were invisible until a manual opcache_reset() / app cycle
; (debugged 2026-06-02: the /docs + /openapi.json routes were on disk but never
; served). See RUNBOOK Gotcha #13.
;
; Fix: validate_timestamps=1 so opcache re-checks source mtimes. revalidate_freq
; below caps how often it re-stats (perf vs freshness). The old Gotcha #5 reason
; for =0 (stat'ing 3000 files over SMB) no longer applies — wp-content is now
; the container's LOCAL disk (overlay-rsync target), where stat() is ~microseconds.

[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
; 14400s = 4h. opcache re-stats each source file at most once per 4h window.
; Deploys are therefore "eventually visible" within 4h automatically; for an
; immediate pickup, reset opcache after the deploy (see RUNBOOK Gotcha #13 —
; hit /wp-content/.../opcache-reset or cycle the app).
opcache.revalidate_freq=14400
opcache.fast_shutdown=1
opcache.save_comments=1
; huge_code_pages requires hugepages support on the host; harmless if unsupported.
opcache.huge_code_pages=0
; JIT — WP is mostly I/O bound so the win is small, but it doesn't hurt.
opcache.jit_buffer_size=64M
opcache.jit=tracing

; Realpath cache: now relevant again (validate_timestamps=1). Enlarging it is
; cheap and cuts stat() during opcache revalidation / cache misses.
realpath_cache_size=4M
realpath_cache_ttl=600
