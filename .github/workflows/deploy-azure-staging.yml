name: Build + deploy wp-image → Azure staging

# Pushes to main that touch docker/ or wordpress/ rebuild the WP image and
# push it to ACR as both :latest and :gh-<sha7>. If AZURE_CREDENTIALS_STAGING
# is set, the workflow also hard-cycles the App Service so the new image is
# pulled immediately. Otherwise it just builds + pushes and prints the manual
# cycle command for someone to run.
#
# Pre-reqs (one-time, on the GH side):
#   1. Repo Settings → Environments → staging (created if needed).
#   2. Add the following secrets at the `staging` environment scope:
#        - PUBLIC_ACCESS_PWD       Basic Auth password (baked into image)
#        - ACR_USERNAME            ACR admin username (= "acrjtistaginghecl")
#        - ACR_PASSWORD            ACR admin password
#                                  (fetch with:
#                                    az acr credential show --name acrjtistaginghecl \
#                                      --query 'passwords[0].value' -o tsv)
#        - AZURE_CREDENTIALS_STAGING   (OPTIONAL) JSON output of
#                                  `az ad sp create-for-rbac --role 'Website Contributor'
#                                   --scopes <app-service-resource-id> --json-auth`.
#                                  Lets the workflow auto-cycle the App Service.
#                                  Requires AAD User Access Administrator to create —
#                                  if you don't have that, leave this secret unset
#                                  and run the cycle manually after each push.

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'wordpress/**'
      - '!**.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME: acrjtistaginghecl
  ACR_LOGIN_SERVER: acrjtistaginghecl.azurecr.io
  IMAGE_NAME: wp-jti
  APP_NAME: app-jti-staging-fuml
  RG: rg-jti-staging

jobs:
  build-and-deploy:
    name: Build, push, cycle
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate secrets
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          HTPASSWD_PASSWORD: ${{ secrets.PUBLIC_ACCESS_PWD }}
        run: |
          missing=()
          [ -z "$ACR_USERNAME" ]      && missing+=("ACR_USERNAME")
          [ -z "$ACR_PASSWORD" ]      && missing+=("ACR_PASSWORD")
          [ -z "$HTPASSWD_PASSWORD" ] && missing+=("PUBLIC_ACCESS_PWD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required environment secrets: ${missing[*]}"
            echo "See the workflow header comment for setup instructions."
            exit 1
          fi

      - name: Docker login (ACR admin creds)
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$ACR_PASSWORD" \
            | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA7=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAG="gh-${SHA7}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "sha7=$SHA7"        >> "$GITHUB_OUTPUT"
          echo "ref=${ACR_LOGIN_SERVER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build image
        env:
          HTPASSWD_PASSWORD: ${{ secrets.PUBLIC_ACCESS_PWD }}
        run: |
          REF="${{ steps.tags.outputs.ref }}"
          TAG="${{ steps.tags.outputs.tag }}"
          docker build \
            --file docker/Dockerfile \
            --build-arg HTPASSWD_USER=jti \
            --build-arg HTPASSWD_PASSWORD="$HTPASSWD_PASSWORD" \
            --tag "${REF}:latest" \
            --tag "${REF}:${TAG}" \
            .

      - name: Push image
        run: |
          REF="${{ steps.tags.outputs.ref }}"
          TAG="${{ steps.tags.outputs.tag }}"
          docker push "${REF}:latest"
          docker push "${REF}:${TAG}"
          echo "✅ Pushed ${REF}:latest and ${REF}:${TAG}"

      - name: Cycle App Service (if SP credentials present)
        env:
          AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS_STAGING }}
        run: |
          if [ -z "$AZURE_CREDS" ]; then
            echo "::warning::AZURE_CREDENTIALS_STAGING not set — skipping auto-cycle."
            echo "The new image is in ACR but the App Service is still on the old one."
            echo "Run manually to deploy:"
            echo "  az webapp stop  --name $APP_NAME --resource-group $RG"
            echo "  az webapp start --name $APP_NAME --resource-group $RG"
            exit 0
          fi
          echo "$AZURE_CREDS" > /tmp/creds.json
          az login --service-principal \
            --username "$(jq -r .clientId /tmp/creds.json)" \
            --password "$(jq -r .clientSecret /tmp/creds.json)" \
            --tenant   "$(jq -r .tenantId /tmp/creds.json)" \
            > /dev/null
          rm -f /tmp/creds.json
          echo "stopping..."
          az webapp stop  --name "$APP_NAME" --resource-group "$RG"
          echo "starting..."
          az webapp start --name "$APP_NAME" --resource-group "$RG"
          echo "✅ App Service cycled. New image will be pulled on next request."
          echo "Verify in ~2-3 min:"
          echo "  curl -u jti:<pw> https://staging.journalismtrustinitiative.org/"
